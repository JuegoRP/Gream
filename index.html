<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gream">
<meta name="theme-color" content="#2d5a1b">
<meta name="format-detection" content="telephone=no">
<title>Gream</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icons/apple-touch-icon-120.png">
<link rel="apple-touch-icon" sizes="76x76" href="icons/apple-touch-icon-76.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/themes.css">
<!-- Leaflet (lazy-loaded only when map view opens) — preconnect for speed -->
<link rel="preconnect" href="https://unpkg.com">
<link rel="preconnect" href="https://tile.openstreetmap.org" crossorigin>
</head>
<body>

<!-- LOADING fallback (visible until JS replaces it) -->
<div id="appLoadingFallback" style="position:fixed;inset:0;top:0;right:0;bottom:0;left:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#cbe3a0;font-family:'Nunito','Helvetica',sans-serif;color:#1a3d0a;z-index:9999">
  <div style="font-size:48px;margin-bottom:14px;animation:pulse 2s infinite">🌱</div>
  <div style="font-size:16px;font-weight:800">Gream</div>
  <div id="appLoadingMsg" style="font-size:12px;margin-top:8px;opacity:0.7">Loading...</div>
  <style>@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}</style>
</div>

<noscript>
  <div style="position:fixed;inset:0;top:0;right:0;bottom:0;left:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#cbe3a0;font-family:'Nunito',sans-serif;color:#1a3d0a;text-align:center;padding:20px;z-index:9999">
    <div style="font-size:48px;margin-bottom:14px">🌱</div>
    <h1 style="font-size:22px;margin:0 0 8px">Gream</h1>
    <p style="font-size:14px">JavaScript is required. Please enable it.</p>
    <p style="font-size:12px;opacity:0.7;margin-top:8px">JavaScript je nutný. Prosím povolte ho.</p>
  </div>
</noscript>

<!-- BACKGROUND -->
<div class="bg-nature" id="bgNature">
  <div class="sun"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="bf bf1">🦋</div>
  <div class="bf bf2">🦋</div>
  <div class="tree t1"><div class="top"></div><div class="trunk"></div></div>
  <div class="tree t2"><div class="top"></div><div class="trunk"></div></div>
  <div class="tree t3"><div class="top"></div><div class="trunk"></div></div>
  <div class="tree t4"><div class="top"></div><div class="trunk"></div></div>
</div>

<!-- LANG TOGGLE (pre-login) -->
<div class="lang-toggle hidden" id="gLangToggle">
  <button class="lang-btn" id="glEN" onclick="App.setLang('en')">EN</button>
  <button class="lang-btn" id="glCZ" onclick="App.setLang('cs')">CZ</button>
</div>

<!-- SCREEN CONTAINER — screens injected here -->
<div id="screenContainer"></div>

<!-- BOTTOM TAB BAR -->
<nav id="tabBar" class="tab-bar hidden">
  <button class="tab-btn" id="tab-garden" onclick="App.showTab('garden')">
    <span class="tab-icon">🌱</span>
    <span class="tab-lbl" id="tabLblGarden">Garden</span>
  </button>
  <button class="tab-btn" id="tab-map" onclick="App.showTab('map')">
    <span class="tab-icon">🗺️</span>
    <span class="tab-lbl" id="tabLblMap">Map</span>
  </button>
  <button class="tab-btn" id="tab-hub" onclick="App.showTab('hub')">
    <span class="tab-icon">☰</span>
    <span class="tab-lbl" id="tabLblHub">Me</span>
  </button>
</nav>

<script type="module" src="js/app.js"></script>
<script>
  // If module fails to load (Safari syntax error, CORS, etc.), show error after 4s
  setTimeout(function() {
    var fallback = document.getElementById('appLoadingFallback');
    var msg = document.getElementById('appLoadingMsg');
    if (fallback && fallback.style.display !== 'none' && msg && msg.textContent === 'Loading...') {
      msg.innerHTML = '<div style="color:#c54a3d;font-weight:700;margin-bottom:6px">Failed to start</div>' +
        '<div style="font-size:10px;opacity:0.7;max-width:280px">JavaScript module did not run. ' +
        'This usually means a syntax error or your browser is too old.</div>' +
        '<div style="font-size:10px;opacity:0.7;margin-top:6px">' +
        'Check the browser console (Web Inspector) for errors.</div>' +
        '<button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;border:none;border-radius:8px;background:#4a8a2e;color:white;font-weight:700;cursor:pointer">Reload</button>';
    }
  }, 4000);
</script>
</body>
</html>
