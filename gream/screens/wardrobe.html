<div class="map-bar">
  <button class="btn-back" onclick="App.goTo('home')" style="background:none;border:none;font-family:inherit;font-weight:800;color:var(--green-deep);cursor:pointer;font-size:15px">←</button>
  <div style="flex:1;text-align:center">
    <div style="font-size:18px;font-weight:900;color:var(--green-deep)" id="wardTitle">🛒 Obchod</div>
  </div>
  <div class="streak-pill" style="background:linear-gradient(135deg,#fde7a8,#f5a623)">🌱 <span id="wardSeeds">0</span></div>
</div>

<div class="ward-tabs" style="display:flex;gap:6px;margin:0 auto 14px;max-width:420px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch">
  <button class="ward-tab active" data-tab="greams"  id="wardTabGreams"  onclick="App.wardSwitchTab('greams')"></button>
  <button class="ward-tab"        data-tab="boosts"  id="wardTabBoosts"  onclick="App.wardSwitchTab('boosts')"></button>
  <button class="ward-tab"        data-tab="acc"     id="wardTabAcc"     onclick="App.wardSwitchTab('acc')"></button>
  <button class="ward-tab"        data-tab="avatars" id="wardTabAvatars" onclick="App.wardSwitchTab('avatars')"></button>
  <button class="ward-tab"        data-tab="frames"  id="wardTabFrames"  onclick="App.wardSwitchTab('frames')"></button>
</div>

<div id="wardGrid" style="max-width:420px;margin:0 auto"></div>
