<div class="ob-flow" id="obFlow">

  <!-- STEP 1: Welcome (kid-friendly) -->
  <div class="ob-step active" data-step="1">
    <div class="ob-art">
      <div class="ob-glow"></div>
      <span class="ob-emoji">🌱</span>
    </div>
    <h1 class="ob-title" id="obTitle1">Welcome</h1>
    <p class="ob-sub" id="obSub1"></p>
    <button class="btn-primary ob-btn" onclick="App.obNext()" id="obBtn1">Continue</button>
  </div>

  <!-- STEP 2: Parent notice + legal (REQUIRED before any data collection) -->
  <div class="ob-step" data-step="2">
    <div class="ob-art">
      <span class="ob-emoji">👨‍👩‍👧</span>
    </div>
    <h1 class="ob-title" id="obTitle2">For parents</h1>
    <p class="ob-sub" id="obSub2"></p>

    <div class="ob-legal-box" id="obLegalBox">
      <div class="ob-legal-row">
        <span class="ob-legal-icon">🔒</span>
        <div>
          <div class="ob-legal-name" id="obLegalDataName"></div>
          <div class="ob-legal-desc" id="obLegalDataDesc"></div>
        </div>
      </div>
      <div class="ob-legal-row">
        <span class="ob-legal-icon">📍</span>
        <div>
          <div class="ob-legal-name" id="obLegalLocName"></div>
          <div class="ob-legal-desc" id="obLegalLocDesc"></div>
        </div>
      </div>
      <div class="ob-legal-row">
        <span class="ob-legal-icon">📷</span>
        <div>
          <div class="ob-legal-name" id="obLegalCamName"></div>
          <div class="ob-legal-desc" id="obLegalCamDesc"></div>
        </div>
      </div>
      <div class="ob-legal-row">
        <span class="ob-legal-icon">🚫</span>
        <div>
          <div class="ob-legal-name" id="obLegalAdsName"></div>
          <div class="ob-legal-desc" id="obLegalAdsDesc"></div>
        </div>
      </div>
    </div>

    <p class="ob-legal-fineprint" id="obLegalFineprint"></p>

    <label class="ob-consent-row" id="obConsentRow">
      <input type="checkbox" id="obConsentCheck" onchange="App.obToggleConsent()">
      <span id="obConsentText"></span>
    </label>

    <button class="btn-primary ob-btn" onclick="App.obNext()" id="obBtn2" disabled>Continue</button>
  </div>

  <!-- STEP 3: The Greamík story -->
  <div class="ob-step" data-step="3">
    <div class="ob-art">
      <div class="ob-art-greams">
        <span style="font-size:50px;animation:greamIdle 3s ease-in-out infinite">🌳</span>
        <span style="font-size:50px;animation:greamIdle 3s ease-in-out infinite 0.4s">📖</span>
        <span style="font-size:50px;animation:greamIdle 3s ease-in-out infinite 0.8s">🎨</span>
      </div>
    </div>
    <h1 class="ob-title" id="obTitle3">Meet Greamíci</h1>
    <p class="ob-sub" id="obSub3"></p>
    <button class="btn-primary ob-btn" onclick="App.obNext()" id="obBtn3">Continue</button>
  </div>

  <!-- STEP 4: Permissions -->
  <div class="ob-step" data-step="4">
    <div class="ob-art">
      <span class="ob-emoji">⚙️</span>
    </div>
    <h1 class="ob-title" id="obTitle4">Quick setup</h1>
    <p class="ob-sub" id="obSub4"></p>

    <div class="ob-perm-list">
      <button class="ob-perm-row" id="obPermLoc" onclick="App.obAskLocation()">
        <span class="ob-perm-icon">📍</span>
        <div class="ob-perm-text">
          <div class="ob-perm-name" id="obPermLocName"></div>
          <div class="ob-perm-desc" id="obPermLocDesc"></div>
        </div>
        <span class="ob-perm-state" id="obPermLocState">→</span>
      </button>
      <button class="ob-perm-row" id="obPermSnd" onclick="App.obAskSound()">
        <span class="ob-perm-icon">🔊</span>
        <div class="ob-perm-text">
          <div class="ob-perm-name" id="obPermSndName"></div>
          <div class="ob-perm-desc" id="obPermSndDesc"></div>
        </div>
        <span class="ob-perm-state" id="obPermSndState">→</span>
      </button>
    </div>

    <button class="btn-primary ob-btn" onclick="App.obNext()" id="obBtn4">Continue</button>
    <button class="ob-btn-skip" onclick="App.obNext()" id="obBtnSkip">Skip for now</button>
  </div>

  <!-- STEP 5: Name + avatar + age (essential profile) -->
  <div class="ob-step" data-step="5">
    <div class="ob-art">
      <span class="ob-emoji">👋</span>
    </div>
    <h1 class="ob-title" id="obTitle5">What's your name?</h1>
    <p class="ob-sub" id="obSub5"></p>

    <input class="name-input input-field" id="nameInput" maxlength="20"
      placeholder="" oninput="App.validateOb()" autocomplete="off">

    <div class="ob-label" id="ob-av-lbl" style="margin-top:14px"></div>
    <div class="avatar-row">
      <div class="av-opt active" data-av="🧒" onclick="App.pickAvatar(this)">🧒</div>
      <div class="av-opt" data-av="👧" onclick="App.pickAvatar(this)">👧</div>
      <div class="av-opt" data-av="👦" onclick="App.pickAvatar(this)">👦</div>
      <div class="av-opt" data-av="🧑" onclick="App.pickAvatar(this)">🧑</div>
      <div class="av-opt" data-av="🌟" onclick="App.pickAvatar(this)">🌟</div>
      <div class="av-opt" data-av="🦊" onclick="App.pickAvatar(this)">🦊</div>
      <div class="av-opt" data-av="🐻" onclick="App.pickAvatar(this)">🐻</div>
      <div class="av-opt" data-av="🐸" onclick="App.pickAvatar(this)">🐸</div>
    </div>

    <button class="btn-primary ob-btn" id="btnOb" onclick="App.createProfile()" disabled>Start</button>
  </div>

  <!-- STEP 6: Egg reveal (final delight moment) -->
  <div class="ob-step" data-step="6">
    <div style="width:110px;height:110px;border-radius:50%;background:rgba(74,138,46,0.12);border:3px solid rgba(74,138,46,0.28);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;animation:obFloat 2.5s ease-in-out infinite">
      <img src="img/greamici/seed_1.png"
           style="width:72px;height:72px;object-fit:contain;image-rendering:auto"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span style="font-size:52px;display:none">🥚</span>
    </div>
    <h1 class="ob-title" id="obTitle6">Your egg</h1>
    <p class="ob-sub" id="obSub6"></p>
    <button class="btn-primary ob-btn" onclick="App.obFinish()" id="obBtn6">Let's begin</button>
  </div>

  <!-- Step indicators (dots) -->
  <div class="ob-dots" id="obDots">
    <span class="ob-dot active" data-step="1"></span>
    <span class="ob-dot" data-step="2"></span>
    <span class="ob-dot" data-step="3"></span>
    <span class="ob-dot" data-step="4"></span>
    <span class="ob-dot" data-step="5"></span>
    <span class="ob-dot" data-step="6"></span>
  </div>

</div>
