<!-- Top bar -->
<div class="home-bar" style="width:100%;max-width:480px">
  <button class="home-av" id="mapAv" onclick="App.goTo('profiles')"></button>
  <div class="home-bar-info">
    <div class="home-greeting" id="mapGreeting"></div>
    <div class="home-name" id="mapName"></div>
  </div>
  <div class="home-pills">
    <div class="streak-pill" onclick="App.goTo('badges')">🔥 <span id="streakNum">0</span></div>
    <div class="seed-pill" onclick="App.showTab('hub')">🌱 <span id="seedNum">0</span></div>
  </div>
</div>

<!-- Garden stage card -->
<div class="gream-stage" id="greamStage">
  <div class="gream-bg"></div>
  <div class="gream-floor"></div>

  <div class="home-jar-wrap" id="homeJarWrap">
    <div class="home-jar-glow"></div>
    <div class="home-jar-glass">
      <img src="img/greamici/seed_1.png" id="homeJarStage"
        style="width:72px;height:72px;image-rendering:auto;display:block;margin:auto"
        onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <div style="font-size:56px;display:none">🥚</div>
    </div>
    <div class="home-jar-base"></div>
  </div>

  <img id="greamSprite" class="gream-sprite" alt="" onclick="App.tapGream()" style="display:none">
  <div class="gream-shadow" id="greamShadow" style="display:none"></div>
  <div class="gream-speech" id="greamSpeech"></div>
</div>

<!-- Greamík name (tap to rename) -->
<div id="greamDisplayName"
  style="font-size:20px;font-weight:900;color:var(--green-deep);cursor:pointer;text-align:center;padding:8px 12px 0;width:100%;max-width:480px"
  onclick="App.promptRenameGream()"></div>

<!-- Garden action buttons -->
<div style="width:100%;max-width:380px;padding:8px 0;display:flex;flex-direction:column;gap:8px">
  <button class="btn-primary" onclick="App.startIndoor()"
    style="padding:14px 20px;font-size:16px">
    🏠 <span id="hcIndoorTitle">Domácí výzva</span>
  </button>
  <div style="display:flex;gap:8px">
    <button class="btn-ghost" onclick="App.showTab('map')"
      style="flex:1;padding:12px 14px;font-size:15px;font-weight:800">
      🗺️ <span id="hcGoOutTitle">Pojď ven</span>
    </button>
    <button class="btn-ghost" onclick="App.openBattleIntro()"
      style="flex:1;padding:12px 14px;font-size:15px;font-weight:800;border-color:rgba(210,90,60,0.4);color:#c0503a">
      ⚔️ <span id="hcBattleTitle">Souboj</span>
    </button>
  </div>
</div>

<div id="dailyCounter" style="display:none"><span id="dailyCountText"></span><span id="dailyCountdown"></span></div>
<div id="needsBar" style="display:none"></div>
