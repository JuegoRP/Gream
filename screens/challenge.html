<div class="ch-header">
  <button class="btn-back" onclick="App.goTo('home')">‹</button>
  <div class="ch-world-name" id="chWorldName"></div>
</div>

<div class="bp-card">
  <div class="bp-title" id="bp-title"></div>
  <div class="bp-steps" id="bpSteps"></div>
</div>

<div class="card">
  <div class="ch-step-badge" id="chStepBadge"></div>
  <span class="ch-icon" id="chIcon"></span>
  <div class="ch-label" id="ch-label"></div>
  <div class="ch-text" id="chText"></div>
  <button class="ch-hint-btn" id="chHintBtn" onclick="App.showHint()">💡 <span id="chHintLabel">Nápověda</span></button>
  <div class="ch-hint-text" id="chHintText" style="display:none"><span id="chHint"></span></div>
</div>

<!-- Action buttons rendered dynamically by Challenge._renderActionButtons() -->
<div id="action-btns" style="width:100%;max-width:420px;display:flex;flex-direction:column;gap:8px"></div>

<!-- Report a bad question -->
<button onclick="App.reportCurrentChallenge()"
  style="margin-top:14px;background:none;border:none;color:#b9b9b9;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;padding:6px 10px">
  🚩 <span id="chReportLbl">Nahlásit otázku</span>
</button>
