<div style="width:100%;max-width:380px;display:flex;flex-direction:column;
  align-items:center;gap:20px;text-align:center;padding-top:20px">

  <div style="font-size:64px;animation:bounce 1.5s ease-in-out infinite">👨‍👩‍👧</div>

  <div id="pc-title" style="font-size:22px;font-weight:900;color:var(--green-dark)"></div>
  <div id="pc-sub"   style="font-size:15px;font-weight:600;color:var(--green-mid);line-height:1.6;max-width:300px"></div>

  <div id="pcProofWrap" style="width:100%;max-width:300px"></div>

  <div style="display:flex;gap:12px;width:100%;max-width:300px">
    <button onclick="App.parentDeny()"
      style="flex:1;padding:16px;border-radius:var(--r-lg);
      border:2.5px solid var(--green-pale);background:white;
      font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;
      color:var(--green-mid);cursor:pointer" id="pc-no"></button>
    <button onclick="App.parentConfirm()"
      style="flex:2;padding:16px;border-radius:var(--r-lg);border:none;
      background:linear-gradient(135deg,var(--green-mid),var(--green-dark));
      color:white;font-family:'Nunito',sans-serif;
      font-size:17px;font-weight:900;cursor:pointer;
      box-shadow:0 4px 16px rgba(74,138,46,0.4)" id="pc-yes"></button>
  </div>

  <div id="pc-hint" style="font-size:12px;color:var(--green-mid);max-width:280px;line-height:1.5"></div>
</div>
