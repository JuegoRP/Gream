<!-- Profile header -->
<div style="width:100%;max-width:420px;background:linear-gradient(135deg,var(--green-mid),var(--green-dark));border-radius:20px;padding:18px 20px;display:flex;align-items:center;gap:14px;margin-bottom:18px;box-shadow:0 6px 20px rgba(74,138,46,0.35)">
  <button id="hubAv" onclick="App.goTo('profiles')" style="width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.2);border:2.5px solid rgba(255,255,255,0.5);font-size:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer"></button>
  <div style="flex:1;min-width:0">
    <div id="hubName" style="font-size:18px;font-weight:900;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
    <div id="hubSub" style="font-size:12px;color:rgba(255,255,255,0.75);font-weight:700;margin-top:2px"></div>
  </div>
  <div style="text-align:right;flex-shrink:0">
    <div style="font-size:11px;color:rgba(255,255,255,0.65);font-weight:700" id="hubSeedsLbl">Semínka</div>
    <div id="hubSeeds" style="font-size:22px;font-weight:900;color:white">🌱 0</div>
  </div>
</div>

<!-- Greamíci card -->
<button onclick="App.goTo('wardrobe')" style="width:100%;max-width:420px;background:linear-gradient(135deg,#edfbe0,#c8f0a8);border-radius:18px;padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:14px;border:2px solid rgba(74,138,46,0.22);box-shadow:0 3px 14px rgba(74,138,46,0.18);cursor:pointer;text-align:left">
  <span style="font-size:36px;flex-shrink:0">🐣</span>
  <div style="flex:1;min-width:0">
    <div id="hubGreamiciLbl" style="font-size:17px;font-weight:900;color:var(--green-deep)">Greamíci</div>
    <div id="hubGreamiciSub" style="font-size:12px;color:var(--green-mid);font-weight:700;margin-top:2px">Správa & vývoj mazlíčků</div>
  </div>
  <span style="font-size:20px;color:var(--green-mid)">›</span>
</button>

<!-- Main actions grid -->
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:420px">

  <button onclick="App.goTo('ranking')" style="background:white;border-radius:16px;padding:16px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,0.08);border:none;cursor:pointer;transition:transform 0.15s;text-align:left">
    <span style="font-size:26px">🏆</span>
    <div>
      <div id="hubRankLbl" style="font-size:14px;font-weight:900;color:var(--green-deep)">Ranking</div>
      <div id="hubRankSub" style="font-size:10px;color:var(--green-mid);font-weight:700">Žebříček hráčů</div>
    </div>
  </button>

  <button onclick="App.goTo('badges')" style="background:white;border-radius:16px;padding:16px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,0.08);border:none;cursor:pointer;transition:transform 0.15s;text-align:left">
    <span style="font-size:26px">🏅</span>
    <div>
      <div id="hubBadgesLbl" style="font-size:14px;font-weight:900;color:var(--green-deep)">Odznaky</div>
      <div id="hubBadgesSub" style="font-size:10px;color:var(--green-mid);font-weight:700">Tvůj postup</div>
    </div>
  </button>

  <button onclick="App.goTo('history')" style="background:white;border-radius:16px;padding:16px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,0.08);border:none;cursor:pointer;transition:transform 0.15s;text-align:left">
    <span style="font-size:26px">📜</span>
    <div>
      <div id="hubHistLbl" style="font-size:14px;font-weight:900;color:var(--green-deep)">Historie</div>
      <div id="hubHistSub" style="font-size:10px;color:var(--green-mid);font-weight:700">Splněné úkoly</div>
    </div>
  </button>

  <button onclick="App.goTo('settings')" style="background:white;border-radius:16px;padding:16px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,0.08);border:none;cursor:pointer;transition:transform 0.15s;text-align:left">
    <span style="font-size:26px">⚙️</span>
    <div>
      <div id="hubSetLbl" style="font-size:14px;font-weight:900;color:var(--green-deep)">Nastavení</div>
      <div id="hubSetSub" style="font-size:10px;color:var(--green-mid);font-weight:700">Jazyk, profil, info</div>
    </div>
  </button>

</div>

<!-- Subscribe section (shown when not premium) -->
<div id="hubSubscribeSection" style="display:none;width:100%;max-width:420px;margin-top:10px">
  <button onclick="App.openSubscription()" style="width:100%;padding:16px;border-radius:16px;border:2px solid rgba(245,166,35,0.5);background:linear-gradient(135deg,#fffbf0,#fff3d6);color:#8a5200;font-family:inherit;font-weight:800;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
    <span style="font-size:20px">⭐</span>
    <span id="hubSubscribeLbl">Předplatit Premium</span>
  </button>
</div>
