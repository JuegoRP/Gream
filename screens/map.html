<div class="home-bar">
  <button class="home-av" id="mapAv" onclick="App.showTab('hub')"></button>
  <div class="home-bar-info">
    <div class="home-greeting" id="mapGreeting"></div>
    <div class="home-name" id="mapName"></div>
  </div>
  <div class="home-pills">
    <div class="streak-pill" onclick="App.goTo('badges')">🔥 <span id="streakNum">0</span></div>
    <div class="seed-pill" onclick="App.showTab('hub')">🌱 <span id="seedNum">0</span></div>
  </div>
</div>

<!-- THE STAGE: egg jar OR Gream depending on growth -->
<div class="gream-stage" id="greamStage">
  <div class="gream-bg"></div>
  <div class="gream-floor"></div>

  <!-- Egg jar mode (default for new users, until hatching) -->
  <div class="home-jar-wrap" id="homeJarWrap">
    <div class="home-jar-glow"></div>
    <div class="home-jar-glass">
      <img src="img/greamici/seed_1.png" id="homeJarStage"
        style="width:72px;height:72px;image-rendering:pixelated;display:block;margin:auto"
        onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <div style="font-size:56px;display:none">🥚</div>
    </div>
    <div class="home-jar-base"></div>
  </div>

  <!-- Gream sprite mode (after hatching) -->
  <img id="greamSprite" class="gream-sprite" alt="" onclick="App.tapGream()" style="display:none">
  <div class="gream-shadow" id="greamShadow" style="display:none"></div>

  <div class="gream-speech" id="greamSpeech"></div>
</div>

<!-- Gream display name + stage info -->
<div class="gream-info">
  <div class="gream-display-name" id="greamDisplayName"></div>
  <div class="gream-stage-info" id="greamStageInfo"></div>
</div>

<!-- Compact needs bar (only after hatching) -->
<div class="needs-bar" id="needsBar" style="display:none"></div>

<!-- Two main actions: Indoor / Outdoor -->
<div class="home-choices">
  <button class="home-choice home-choice-indoor" onclick="App.startIndoor()">
    <span class="home-choice-icon">🏠</span>
    <div class="home-choice-text">
      <div class="home-choice-title" id="hcIndoorTitle">Doma klid</div>
      <div class="home-choice-sub" id="hcIndoorSub">Krátký úkol z domova</div>
    </div>
  </button>
  <button class="home-choice home-choice-outdoor" onclick="App.startOutdoor()">
    <span class="home-choice-icon">🚶</span>
    <div class="home-choice-text">
      <div class="home-choice-title" id="hcOutdoorTitle">Pojďme ven</div>
      <div class="home-choice-sub" id="hcOutdoorSub">Najdi místa kolem</div>
    </div>
  </button>
</div>

<!-- Daily counter -->
<div class="daily-counter" id="dailyCounter" style="display:none">
  <span id="dailyCountText"></span>
  <span id="dailyCountdown" style="opacity:0.7;font-size:11px"></span>
</div>
