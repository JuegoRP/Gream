<div class="bc-header max-w" style="margin-bottom:16px">
  <button class="btn-back" onclick="App.goTo('profiles')">‹</button>
  <div style="font-size:20px;font-weight:900;color:var(--green-dark);flex:1" id="stats-title"></div>
</div>

<!-- Stats cards -->
<div class="stats-grid max-w" style="margin-bottom:14px">
  <div class="stat-card">
    <div class="stat-num" id="st-total">0</div>
    <div class="stat-label" id="st-total-lbl"></div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="st-streak">0 🔥</div>
    <div class="stat-label" id="st-streak-lbl"></div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="st-worlds">0/6</div>
    <div class="stat-label" id="st-worlds-lbl"></div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="st-badges">0</div>
    <div class="stat-label" id="st-badges-lbl"></div>
  </div>
</div>

<!-- Leaderboard -->
<div class="card-section max-w">
  <div class="section-title" id="lb-title"></div>
  <div id="lbList"></div>
</div>

<script>
(function(){
  // Labels
  const lang = localStorage.getItem('gream_lang')||'en';
  const L = lang==='cs'
    ? {title:'Statistiky',total:'Celkem úkolů',streak:'Aktuální série',worlds:'Světů prozkoumáno',badges:'Úrovní odznaků',lb:'Žebříček (toto zařízení)',empty:'Zatím žádná data'}
    : {title:'Stats',     total:'Total tasks',  streak:'Current streak',   worlds:'Worlds explored',  badges:'Badge levels',          lb:'Leaderboard (this device)',  empty:'No data yet'};

  document.getElementById('stats-title').textContent   = L.title;
  document.getElementById('st-total-lbl').textContent   = L.total;
  document.getElementById('st-streak-lbl').textContent  = L.streak;
  document.getElementById('st-worlds-lbl').textContent  = L.worlds;
  document.getElementById('st-badges-lbl').textContent  = L.badges;
  document.getElementById('lb-title').textContent       = L.lb;

  // Load data
  let profiles = [];
  try { profiles = JSON.parse(localStorage.getItem('gream_profiles')||'[]'); } catch{}
  const activeId = localStorage.getItem('gream_active');
  const p = profiles.find(x=>x.id===activeId);
  if (!p) return;

  const totalTasks  = p.totalTasks||0;
  const streak      = p.streak||0;
  const wt          = p.worldTasks||{};
  const worldsEx    = Object.values(wt).filter(v=>v>0).length;
  const THRESH      = [0,10,20,30,40,50,100];
  const getLvl      = n => { let l=0; THRESH.forEach((t,i)=>{ if(n>=t)l=i; }); return l; };
  const badgeLvls   = ['nature','language','logic','feelings','arts','world'].reduce((s,w)=>s+getLvl(wt[w]||0),0);

  document.getElementById('st-total').textContent  = totalTasks;
  document.getElementById('st-streak').textContent = streak+' 🔥';
  document.getElementById('st-worlds').textContent = worldsEx+'/6';
  document.getElementById('st-badges').textContent = badgeLvls;

  // Leaderboard
  const sorted = [...profiles].sort((a,b)=>(b.totalTasks||0)-(a.totalTasks||0));
  const lbList = document.getElementById('lbList');
  if (!sorted.length) {
    lbList.innerHTML = `<div style="text-align:center;padding:14px;font-size:13px;color:var(--green-mid);font-weight:600">${L.empty}</div>`;
    return;
  }
  sorted.forEach((entry,i)=>{
    const isSelf  = entry.id===activeId;
    const rankIco = i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
    const row     = document.createElement('div');
    row.className = 'lb-row';
    row.style.cssText = isSelf?'border:2px solid var(--green-pale)':'';
    row.innerHTML = `
      <div class="lb-rank ${i<3?'top'+(i+1):''}">${rankIco}</div>
      <div class="lb-av">${entry.avatar||'🧒'}</div>
      <div class="lb-name">${entry.name}${isSelf?' ★':''}</div>
      <div class="lb-score">${entry.totalTasks||0} pts</div>
    `;
    lbList.appendChild(row);
  });
})();
</script>
