<!-- Minimal top bar -->
<div style="display:flex;align-items:center;gap:10px;padding:0 0 10px">
  <button class="btn-back" onclick="App.goTo('home')" style="flex-shrink:0">←</button>
  <div style="flex:1;min-width:0">
    <div id="mapViewTitle" style="font-size:15px;font-weight:900;color:var(--green-deep);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">🗺️</div>
    <div id="mapViewSub" style="font-size:11px;color:var(--green-mid);font-weight:600"></div>
  </div>
  <button onclick="App.mapRecenter()" style="background:white;border:2px solid rgba(74,138,46,0.3);border-radius:50%;width:38px;height:38px;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">📍</button>
</div>

<!-- Map container -->
<div id="leafletMap" style="width:100%;height:58vh;border-radius:16px;overflow:hidden;background:#e8e8e8;position:relative;flex-shrink:0">
  <div id="mapLoading" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:500;background:rgba(240,240,240,0.9)">
    <div class="gream-spinner"></div>
    <div id="mapLoadingMsg" style="font-size:13px;color:#666;font-weight:700">Finding places nearby…</div>
  </div>
</div>

<!-- World selector pills -->
<div id="mapWorldPills" style="display:flex;gap:6px;overflow-x:auto;padding:10px 0 6px;scrollbar-width:none;-webkit-overflow-scrolling:touch"></div>

<!-- POI bottom sheet — hidden by default -->
<div id="poiSheet" style="
  position:fixed;left:0;right:0;bottom:0;
  background:white;border-radius:24px 24px 0 0;
  padding:14px 20px 32px;
  box-shadow:0 -6px 30px rgba(0,0,0,0.2);
  transform:translateY(100%);
  transition:transform 0.32s cubic-bezier(0.2,0.8,0.2,1);
  z-index:700;max-width:480px;margin:0 auto
">
  <div style="width:36px;height:4px;background:rgba(0,0,0,0.12);border-radius:2px;margin:0 auto 14px"></div>

  <!-- Place type badge -->
  <div id="poiKindBadge" style="
    display:inline-flex;align-items:center;gap:5px;
    padding:4px 12px;border-radius:50px;
    font-size:12px;font-weight:800;
    margin-bottom:10px;
    background:rgba(0,0,0,0.06);color:#555;
  "></div>

  <!-- Bonus world chips -->
  <div id="poiBonusRow" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px"></div>

  <!-- World picker -->
  <div style="font-size:12px;font-weight:700;color:var(--green-mid);margin-bottom:8px" id="poiPickLabel">Pick a world to explore here:</div>
  <div id="poiWorldBtns" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px"></div>

  <button id="poiStartBtn" class="btn-primary" style="width:100%;display:none" onclick="App.startPoiChallenge()"></button>
  <button onclick="App.closePoiSheet()" style="width:100%;margin-top:8px;background:none;border:none;color:var(--green-mid);font-weight:700;font-size:14px;cursor:pointer;padding:6px">Close</button>
</div>
