<!-- Top bar -->
<div style="display:flex;align-items:center;gap:8px;padding:0 0 10px;flex-shrink:0">
  <div style="flex:1;min-width:0">
    <div id="mapViewTitle" style="font-size:15px;font-weight:900;color:var(--green-deep)">🗺️ Mapa</div>
    <div id="mapViewSub" style="font-size:11px;color:var(--green-mid);font-weight:600"></div>
  </div>
  <button onclick="App.mapRecenter()" style="background:white;border:2px solid rgba(74,138,46,0.3);border-radius:50%;width:38px;height:38px;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">📍</button>
  <button onclick="App.toggleMapSidePanel()" id="mapWorldsBtn" style="background:white;border:2px solid rgba(74,138,46,0.3);border-radius:50%;width:38px;height:38px;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">🌍</button>
</div>

<!-- Map fills remaining space -->
<div id="leafletMap" style="width:100%;flex:1;min-height:0;border-radius:16px;overflow:hidden;background:#e8e8e8;position:relative">
  <div id="mapLoading" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:500;background:rgba(240,240,240,0.9)">
    <div class="gream-spinner"></div>
    <div id="mapLoadingMsg" style="font-size:13px;color:#666;font-weight:700">Hledám místa…</div>
  </div>
</div>

<!-- World side panel (slides from right) -->
<div id="mapSidePanel" style="
  position:fixed;top:0;right:0;bottom:0;width:190px;
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  z-index:450;
  transform:translateX(110%);
  transition:transform 0.28s cubic-bezier(0.2,0.8,0.2,1);
  box-shadow:-4px 0 24px rgba(0,0,0,0.18);
  display:flex;flex-direction:column;
  padding:calc(var(--sat,0px) + 16px) 0 calc(var(--sab,0px) + 70px);
  overflow:hidden;
">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:0 16px 12px;flex-shrink:0">
    <div style="font-size:14px;font-weight:900;color:var(--green-deep)" id="mapSidePanelTitle">Světy</div>
    <button onclick="App.toggleMapSidePanel()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--green-mid);padding:4px">✕</button>
  </div>
  <div id="mapSidePillsContainer" style="overflow-y:auto;padding:0 12px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch"></div>
</div>

<!-- Backdrop for side panel -->
<div id="mapSidePanelBack" onclick="App.toggleMapSidePanel()"
  style="display:none;position:fixed;inset:0;z-index:440;background:rgba(0,0,0,0.2)"></div>
