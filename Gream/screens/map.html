<div class="map-bar">
  <div class="map-av" id="mapAv" onclick="App.goTo('profiles')"></div>
  <div style="flex:1;min-width:0">
    <div class="map-name" id="mapName"></div>
    <div class="map-title" id="mapTitle"></div>
  </div>
  <div class="streak-pill" onclick="App.goTo('badges')">🔥 <span id="streakNum">1</span></div>
</div>

<div class="worlds-grid">
  <div class="wtile w-nature"   id="tile-nature"   onclick="App.openWorld('nature')">
    <div class="wtile-icon">🌿</div>
    <div class="tile-dots" id="dots-nature"></div>
    <div class="wtile-name" id="wn-nature"></div>
    <div class="wtile-prog" id="wp-nature"></div>
  </div>
  <div class="wtile w-language" id="tile-language" onclick="App.openWorld('language')">
    <div class="wtile-icon">📖</div>
    <div class="tile-dots" id="dots-language"></div>
    <div class="wtile-name" id="wn-language"></div>
    <div class="wtile-prog" id="wp-language"></div>
  </div>
  <div class="wtile w-logic"    id="tile-logic"    onclick="App.openWorld('logic')">
    <div class="wtile-icon">🧩</div>
    <div class="tile-dots" id="dots-logic"></div>
    <div class="wtile-name" id="wn-logic"></div>
    <div class="wtile-prog" id="wp-logic"></div>
  </div>
  <div class="wtile w-feelings" id="tile-feelings" onclick="App.openWorld('feelings')">
    <div class="wtile-icon">💛</div>
    <div class="tile-dots" id="dots-feelings"></div>
    <div class="wtile-name" id="wn-feelings"></div>
    <div class="wtile-prog" id="wp-feelings"></div>
  </div>
  <div class="wtile w-arts"     id="tile-arts"     onclick="App.openWorld('arts')">
    <div class="wtile-icon">🎨</div>
    <div class="tile-dots" id="dots-arts"></div>
    <div class="wtile-name" id="wn-arts"></div>
    <div class="wtile-prog" id="wp-arts"></div>
  </div>
  <div class="wtile w-world"    id="tile-world"    onclick="App.openWorld('world')">
    <div class="wtile-icon">🌍</div>
    <div class="tile-dots" id="dots-world"></div>
    <div class="wtile-name" id="wn-world"></div>
    <div class="wtile-prog" id="wp-world"></div>
  </div>
</div>

<div class="badges-bar" onclick="App.goTo('badges')">
  <div class="bb-label" id="bb-label"></div>
  <div class="bb-icons" id="bbIcons"></div>
  <span style="font-size:18px;color:var(--green-mid)">›</span>
</div>
