<div class="ob-card anim-slide">
  <span class="app-logo anim-bounce">🌱</span>
  <div class="app-name">Gream</div>
  <div class="app-tagline" id="ob-tagline"></div>

  <div class="ob-label" id="ob-name-lbl"></div>
  <input class="name-input input-field" id="nameInput" maxlength="20" oninput="App.validateOb()" style="margin-bottom:18px">

  <div class="ob-label" id="ob-av-lbl"></div>
  <div class="avatar-row">
    <div class="av-opt active" data-av="🧒" onclick="App.pickAvatar(this)">🧒</div>
    <div class="av-opt" data-av="👧" onclick="App.pickAvatar(this)">👧</div>
    <div class="av-opt" data-av="👦" onclick="App.pickAvatar(this)">👦</div>
    <div class="av-opt" data-av="🧑" onclick="App.pickAvatar(this)">🧑</div>
    <div class="av-opt" data-av="🌟" onclick="App.pickAvatar(this)">🌟</div>
    <div class="av-opt" data-av="🦊" onclick="App.pickAvatar(this)">🦊</div>
    <div class="av-opt" data-av="🐻" onclick="App.pickAvatar(this)">🐻</div>
    <div class="av-opt" data-av="🐸" onclick="App.pickAvatar(this)">🐸</div>
    <div class="av-photo-btn" onclick="App.pickAvatarPhoto()" title="Upload photo">📷</div>
  </div>

  <div class="ob-label" id="ob-age-lbl"></div>
  <div class="age-row">
    <button class="age-btn active" onclick="App.setObAge('4-6',this)">4–6</button>
    <button class="age-btn" onclick="App.setObAge('7-9',this)">7–9</button>
    <button class="age-btn" onclick="App.setObAge('10-15',this)">10–15</button>
    <button class="age-btn" onclick="App.setObAge('15+',this)">15+</button>
  </div>

  <button class="btn-primary" id="btnOb" onclick="App.createProfile()" disabled></button>
</div>
