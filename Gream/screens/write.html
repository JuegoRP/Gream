<div class="draw-header max-w">
  <button class="btn-back" onclick="App.goTo('challenge')">‹</button>
  <div id="write-label" style="font-size:16px;font-weight:900;color:var(--green-dark);flex:1"></div>
</div>

<textarea
  id="writeTextarea"
  style="
    width:100%; max-width:420px; min-height:200px;
    padding:16px 18px; border-radius:var(--r-lg);
    border:2.5px solid var(--green-pale);
    font-family:'Nunito',sans-serif;
    font-size:16px; font-weight:600; line-height:1.65;
    color:var(--green-deep); background:white;
    resize:none; outline:none;
    box-shadow:0 4px 18px rgba(0,0,0,0.07);
    transition:border-color 0.2s; flex-shrink:0;
  "
  onfocus="this.style.borderColor='var(--green-mid)'"
  onblur="this.style.borderColor='var(--green-pale)'"
  oninput="App.writeValidate(this)"
></textarea>

<div style="display:flex;justify-content:space-between;align-items:center;width:100%;max-width:420px">
  <span id="writeCount" style="font-size:12px;color:var(--green-mid);font-weight:700">0</span>
  <span id="writeHint"  style="font-size:12px;color:var(--green-mid);font-weight:600"></span>
</div>

<button id="btn-done-write" onclick="App.writeDone()" disabled
  style="width:100%;max-width:420px;padding:15px;border-radius:var(--r-lg);border:none;
  background:linear-gradient(135deg,var(--green-mid),var(--green-dark));color:white;
  font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;
  box-shadow:0 4px 16px rgba(74,138,46,0.35);
  opacity:0.4;transition:opacity 0.2s,transform 0.15s;cursor:not-allowed">
</button>
