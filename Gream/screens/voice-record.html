<div class="draw-header max-w">
  <button class="btn-back" onclick="App.vrCancel()">‹</button>
  <div id="vr-title" style="font-size:16px;font-weight:900;color:var(--green-dark);flex:1"></div>
</div>

<div style="width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;gap:20px;padding-top:20px">

  <div id="vrMicBtn"
    style="width:120px;height:120px;border-radius:50%;
    background:linear-gradient(135deg,var(--pink),var(--pink-dark));
    display:flex;align-items:center;justify-content:center;
    font-size:52px;cursor:pointer;
    box-shadow:0 6px 28px rgba(212,83,126,0.4);
    transition:transform 0.15s,box-shadow 0.15s;user-select:none;"
    onclick="App.vrToggle()">🎙️</div>

  <div id="vrStatus" style="font-size:16px;font-weight:700;color:var(--green-mid);text-align:center;min-height:24px"></div>
  <div id="vrTimer"  style="font-size:36px;font-weight:900;color:var(--green-dark);min-height:44px;font-variant-numeric:tabular-nums"></div>

  <div id="vrWave" style="display:flex;align-items:center;gap:3px;opacity:0;transition:opacity 0.3s;height:40px">
    <div style="width:5px;border-radius:3px;background:var(--pink);animation:wv .6s ease-in-out infinite alternate;height:8px"></div>
    <div style="width:5px;border-radius:3px;background:var(--pink);animation:wv .6s ease-in-out infinite alternate .1s;height:8px"></div>
    <div style="width:5px;border-radius:3px;background:var(--pink);animation:wv .6s ease-in-out infinite alternate .2s;height:8px"></div>
    <div style="width:5px;border-radius:3px;background:var(--pink);animation:wv .6s ease-in-out infinite alternate .05s;height:8px"></div>
    <div style="width:5px;border-radius:3px;background:var(--pink);animation:wv .6s ease-in-out infinite alternate .15s;height:8px"></div>
    <div style="width:5px;border-radius:3px;background:var(--pink);animation:wv .6s ease-in-out infinite alternate .25s;height:8px"></div>
    <div style="width:5px;border-radius:3px;background:var(--pink);animation:wv .6s ease-in-out infinite alternate .1s;height:8px"></div>
    <div style="width:5px;border-radius:3px;background:var(--pink);animation:wv .6s ease-in-out infinite alternate .2s;height:8px"></div>
  </div>

  <button id="vrDoneBtn" onclick="App.vrDone()"
    style="display:none;width:100%;max-width:300px;padding:16px;
    border-radius:var(--r-lg);border:none;
    background:linear-gradient(135deg,var(--green-mid),var(--green-dark));
    color:white;font-family:'Nunito',sans-serif;
    font-size:17px;font-weight:900;cursor:pointer;
    box-shadow:0 4px 16px rgba(74,138,46,0.4);" id="vrDoneBtn"></button>

  <div id="vrHint" style="font-size:13px;color:var(--green-mid);text-align:center;max-width:280px;line-height:1.5"></div>
</div>

<style>
@keyframes wv { from{height:6px;opacity:.5} to{height:32px;opacity:1} }
</style>
