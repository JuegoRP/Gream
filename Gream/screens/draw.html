<div class="draw-header max-w">
  <button class="btn-back" onclick="App.goTo('challenge')">‹</button>
  <div class="draw-label" id="draw-label" style="font-size:16px;font-weight:900;color:var(--green-dark);flex:1"></div>
</div>

<canvas id="drawCanvas"></canvas>

<div class="draw-tools">
  <button class="cbtn active" style="background:#2d5a1b" data-color="#2d5a1b" onclick="App.drawSetColor(this)"></button>
  <button class="cbtn" style="background:#4a9bc4" data-color="#4a9bc4" onclick="App.drawSetColor(this)"></button>
  <button class="cbtn" style="background:#f5a623" data-color="#f5a623" onclick="App.drawSetColor(this)"></button>
  <button class="cbtn" style="background:#ff8fab" data-color="#ff8fab" onclick="App.drawSetColor(this)"></button>
  <button class="cbtn" style="background:#8a4abc" data-color="#8a4abc" onclick="App.drawSetColor(this)"></button>
  <button class="cbtn" style="background:#e53935" data-color="#e53935" onclick="App.drawSetColor(this)"></button>
  <button class="cbtn" style="background:#111"    data-color="#111"    onclick="App.drawSetColor(this)"></button>
  <button class="cbtn" style="background:#fff;border:2px solid #ccc" data-color="#fff" onclick="App.drawSetColor(this)">◻</button>
  <button class="sz-btn active" data-size="4"  onclick="App.drawSetSize(this)">S</button>
  <button class="sz-btn"        data-size="10" onclick="App.drawSetSize(this)">M</button>
  <button class="sz-btn"        data-size="20" onclick="App.drawSetSize(this)">L</button>
  <button class="btn-clear2" onclick="App.drawClear()">🗑️</button>
</div>

<button class="btn-done-draw max-w" id="btn-done-lbl" onclick="App.drawDone()"
  style="padding:15px;border-radius:var(--r-lg);border:none;background:linear-gradient(135deg,var(--green-mid),var(--green-dark));color:white;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(74,138,46,0.4)">
</button>

<script>
(function(){
  const t = window.App ? null : null;
  // Init canvas via Draw module
  import('./camera.js').then(m => m.Draw.open(dataUrl => {
    // onDone already set by Challenge
  }));
  // Set label
  const lang = localStorage.getItem('gream_lang')||'en';
  document.getElementById('draw-label').textContent = lang==='cs'?'Nakresli svůj důkaz 🎨':'Draw your proof 🎨';
  document.getElementById('btn-done-lbl').textContent = lang==='cs'?'✅ Hotovo!':'✅ Done!';
})();
</script>
