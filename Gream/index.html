<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#2d5a1b">
<title>Gream</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/themes.css">
</head>
<body>

<!-- BACKGROUND -->
<div class="bg-nature" id="bgNature">
  <div class="sun"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="bf bf1">🦋</div>
  <div class="bf bf2">🦋</div>
  <div class="tree t1"><div class="top"></div><div class="trunk"></div></div>
  <div class="tree t2"><div class="top"></div><div class="trunk"></div></div>
  <div class="tree t3"><div class="top"></div><div class="trunk"></div></div>
  <div class="tree t4"><div class="top"></div><div class="trunk"></div></div>
</div>

<!-- LANG TOGGLE (pre-login) -->
<div class="lang-toggle hidden" id="gLangToggle">
  <button class="lang-btn" id="glEN" onclick="App.setLang('en')">EN</button>
  <button class="lang-btn" id="glCZ" onclick="App.setLang('cs')">CZ</button>
</div>

<!-- SCREEN CONTAINER — screens injected here -->
<div id="screenContainer"></div>

<!-- CAMERA (persistent) -->
<div class="screen hidden" id="screen-camera">
  <video id="videoEl" autoplay playsinline muted></video>
  <canvas id="canvasEl" style="display:none"></canvas>
  <div class="cam-ui">
    <div class="cam-top">
      <button class="btn-cam-x" onclick="App.cameraClose()">✕</button>
    </div>
    <div class="cam-bottom">
      <button class="btn-shutter" onclick="App.cameraTakePhoto()"></button>
    </div>
  </div>
</div>

<!-- TTS BUTTON (floating, kids mode) -->
<button class="btn-tts hidden" id="ttsBtn" onclick="App.speakChallenge()">🔊</button>

<script type="module" src="js/app.js"></script>
</body>
</html>
